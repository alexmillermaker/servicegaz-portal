<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: save the path and redirect to the app root
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/');
    var path = l.pathname.slice(base.length) + l.search + l.hash;
    sessionStorage.setItem('spa-path', path || '/');
    l.replace(l.origin + base + '/');
  </script>
</head>
<body></body>
</html>
